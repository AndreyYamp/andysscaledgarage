<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract automotive cover</title>
  <desc id="desc">A minimal red and charcoal composition with sweeping lines inspired by a supercar profile.</desc>
