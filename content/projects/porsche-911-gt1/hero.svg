<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Abstract Porsche GT1 cover</title>
  <desc id="desc">A minimal silver and charcoal composition suggesting a long-tail racing car profile.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0" />
      <stop offset="50%" stop-color="#f8fafc" stop-opacity="0.88" />
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0" />
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <ellipse cx="1260" cy="190" rx="280" ry="160" fill="#475569" fill-opacity="0.28" />
  <ellipse cx="340" cy="720" rx="420" ry="180" fill="#020617" fill-opacity="0.72" />

