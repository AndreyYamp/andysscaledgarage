  <circle cx="516" cy="646" r="50" fill="none" stroke="#94a3b8" stroke-opacity="0.42" stroke-width="4" />
  <circle cx="1116" cy="596" r="56" fill="none" stroke="#94a3b8" stroke-opacity="0.42" stroke-width="4" />
</svg>
