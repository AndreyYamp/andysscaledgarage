languageCode: en-us
title: Andrey's Scaled Garage

module:
  hugoVersion:
    min: "0.146.0"
    extended: true
  mounts:
  - source: content
    target: content
  - source: static
    target: static
  - source: layouts
    target: layouts
  - source: data
    target: data
  - source: assets
    target: assets
  - source: i18n
    target: i18n
  - source: archetypes
    target: archetypes
  - source: ../../node_modules/flag-icons/flags
    target: static/flags
  - source: ../../node_modules/@fontsource/mulish/files
    target: static/files
  - source: ../../node_modules/katex/dist/fonts
    target: static/fonts

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  description: A calm project journal for scale model car builds.
  features:
    homeJournal:
      enable: true
      eyebrow: Scale Model Journal
      title: Featured builds arranged like a quiet magazine spread.
      intro: Ferrari leads the front page for now, with a few more project stories waiting in the garage.
      archiveLabel: Browse the full project archive
      featuredLabel: Featured Project
